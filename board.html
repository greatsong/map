<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 선생님 지도 🗺️</title>
<style>
  :root{ --gold:#F4B400; --accent:#E8930C; --bg:#FFFDF7; --card:#FFF6E0; --border:#F0E2BC; --text:#3A2E1A; --muted:#9A8B6A; --shadow:rgba(180,140,20,.25); }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:radial-gradient(1200px 820px at 72% -12%,#FFF7DE,#FFFDF7);color:var(--text);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;}
  /* ── 헤더 ── */
  #head{padding:16px 28px 4px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
  #head h1{font-size:clamp(1.3rem,2.2vw,2rem);font-weight:900;letter-spacing:-.03em;margin:0;}
  #head h1 .a{color:var(--accent);}
  .stat{display:flex;align-items:baseline;gap:7px;background:#fff;border:1px solid var(--border);
    border-radius:16px;padding:7px 16px;box-shadow:0 3px 12px var(--shadow);}
  .stat .n{font-size:clamp(1.4rem,2.6vw,2.2rem);font-weight:900;color:var(--accent);line-height:1;
    font-variant-numeric:tabular-nums;transition:transform .18s;}
  .stat .n.bump{transform:scale(1.35);}
  .stat .lb{font-size:.85rem;font-weight:800;color:var(--muted);}
  #main{flex:1;position:relative;min-height:0;}
  #stageWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;transform-origin:center;}
  canvas{display:block;}
  #pins{position:absolute;inset:0;pointer-events:none;}
  /* ── 귀여운 핀 ── */
  .pin{position:absolute;transform:translate(-50%,-100%);will-change:transform;}
  .pin .head{width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2.5px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.28);margin:0 auto;animation:drop .6s cubic-bezier(.2,1.5,.4,1);}
  .pin .head::after{content:"";position:absolute;left:50%;top:45%;width:7px;height:7px;border-radius:50%;
    background:#fff;transform:translate(-50%,-50%) rotate(45deg);}
  .pin .pulse{position:absolute;left:50%;top:9px;width:20px;height:20px;border-radius:50%;
    transform:translate(-50%,-50%);animation:pulse 2.4s ease-out infinite;}
  .pin .ripple{position:absolute;left:50%;top:9px;width:20px;height:20px;border-radius:50%;
    border:3px solid currentColor;transform:translate(-50%,-50%);animation:ripple 1.1s ease-out 1;opacity:0;}
  .pin .lab{margin-top:3px;font-size:11px;font-weight:800;color:var(--text);white-space:nowrap;
    background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:8px;padding:1px 7px;
    box-shadow:0 2px 6px var(--shadow);animation:drop .6s cubic-bezier(.2,1.5,.4,1);}
  @keyframes drop{0%{transform:translateY(-30px) scale(.2);opacity:0;}70%{transform:translateY(3px) scale(1.12);opacity:1;}100%{opacity:1;}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 currentColor;opacity:.5;}70%,100%{box-shadow:0 0 0 16px transparent;opacity:0;}}
  @keyframes ripple{0%{opacity:.6;transform:translate(-50%,-50%) scale(.6);}100%{opacity:0;transform:translate(-50%,-50%) scale(6);}}
  /* ── 시·도 채우기 칩 ── */
  #sido{position:absolute;left:22px;top:14px;display:flex;flex-direction:column;gap:5px;
    background:rgba(255,255,255,.72);border:1px solid var(--border);border-radius:16px;padding:12px 12px;
    backdrop-filter:blur(6px);box-shadow:0 6px 20px var(--shadow);max-height:78%;flex-wrap:wrap;}
  #sido .t{font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:2px;}
  .chips{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .chip{display:flex;justify-content:space-between;gap:6px;align-items:center;font-size:.74rem;font-weight:800;
    padding:4px 9px;border-radius:99px;background:#F3ECD8;color:#B9AA86;transition:.3s;min-width:62px;}
  .chip.on{background:var(--accent);color:#fff;box-shadow:0 3px 9px var(--shadow);}
  .chip .c{font-variant-numeric:tabular-nums;}
  /* ── 방금 합류 티커 ── */
  #ticker{position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:#fff;font-weight:900;font-size:clamp(1rem,1.8vw,1.4rem);
    padding:12px 26px;border-radius:99px;box-shadow:0 10px 30px var(--shadow);opacity:0;transition:.35s;white-space:nowrap;}
  #ticker.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #ticker .rg{opacity:.85;font-weight:700;font-size:.8em;}
  /* ── QR ── */
  #qr{position:absolute;right:22px;bottom:20px;background:#fff;border:1px solid var(--border);border-radius:18px;
    padding:14px 14px 10px;text-align:center;box-shadow:0 10px 30px var(--shadow);}
  #qr img{width:178px;height:178px;display:block;border-radius:8px;}
  #qr .t{margin-top:8px;font-weight:900;font-size:.95rem;}
  #qr .u{font-size:.72rem;color:var(--muted);word-break:break-all;max-width:178px;}
  #qr .arrow{font-size:1.1rem;}
  .conf{position:absolute;top:-24px;font-size:22px;pointer-events:none;z-index:20;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.5;}}
  #empty{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);text-align:center;color:var(--muted);
    font-weight:800;font-size:1.05rem;transition:.4s;}
</style>
</head>
<body>
  <div id="head">
    <h1>🗺️ 우리 학교는 어디에? <span class="a">전국 선생님 지도</span></h1>
    <div class="stat"><span class="n" id="nSchool">0</span><span class="lb">개 학교 🏫</span></div>
    <div class="stat"><span class="n" id="nSido">0</span><span class="lb">개 시·도 🗺️</span></div>
  </div>
  <div id="main">
    <div id="stageWrap"><div id="stage">
      <canvas id="map"></canvas>
      <div id="pins"></div>
    </div></div>
    <div id="sido"><div class="t">전국이 채워지는 중…</div><div class="chips" id="chips"></div></div>
    <div id="empty">📱 오른쪽 QR을 스캔해<br>우리 학교를 지도에 올려주세요!</div>
    <div id="ticker"></div>
    <div id="qr">
      <img id="qrimg" alt="QR">
      <div class="t">📱 여기를 스캔! <span class="arrow">↙</span></div>
      <div class="u" id="qrurl"></div>
    </div>
  </div>

<script>
/* ===== 연결 정보 ===== */
const API_URL   = "https://script.google.com/macros/s/AKfycbyJkRn8dWVTU40QbWEurQVczygBRVYWhVAalIFc_etw6jvzfPjLd0uRuDuuQAQ_DoXXUQ/exec";
const PHONE_URL = "https://greatsong.github.io/map/";
/* ==================== */

const W = 760, H = 980, PAD = 46;
const cv = document.getElementById('map'); cv.width = W; cv.height = H;
const ctx = cv.getContext('2d');
const stage = document.getElementById('stage'); stage.style.width = W+'px'; stage.style.height = H+'px';
const pinsEl = document.getElementById('pins');
const COLORS = ['#E8930C','#F4B400','#EC4899','#10B981','#4C8DF6','#8B5CF6','#EF4444','#14B8A6'];

// 17개 시·도 (구명칭도 매칭)
const SIDO = [
  {s:'서울',re:/^서울/},{s:'경기',re:/^경기/},{s:'인천',re:/^인천/},
  {s:'강원',re:/^강원/},{s:'충북',re:/^충청북|^충북/},{s:'충남',re:/^충청남|^충남/},
  {s:'대전',re:/^대전/},{s:'세종',re:/^세종/},{s:'전북',re:/^전(라|)북/},
  {s:'전남',re:/^전(라|)남/},{s:'광주',re:/^광주/},{s:'경북',re:/^경(상|)북/},
  {s:'경남',re:/^경(상|)남/},{s:'대구',re:/^대구/},{s:'부산',re:/^부산/},
  {s:'울산',re:/^울산/},{s:'제주',re:/^제주/}
];
const sidoCount = {}; SIDO.forEach(x=>sidoCount[x.s]=0);
function sidoOf(region){ const m = SIDO.find(x=>x.re.test(region||'')); return m?m.s:null; }

// 시·도 칩 렌더
const chipsEl = document.getElementById('chips');
SIDO.forEach(x=>{ chipsEl.insertAdjacentHTML('beforeend',
  `<div class="chip" data-s="${x.s}"><span>${x.s}</span><span class="c">0</span></div>`); });
function renderChips(){
  SIDO.forEach(x=>{
    const el = chipsEl.querySelector(`[data-s="${x.s}"]`);
    const n = sidoCount[x.s];
    el.classList.toggle('on', n>0);
    el.querySelector('.c').textContent = n;
  });
  const covered = SIDO.filter(x=>sidoCount[x.s]>0).length;
  bump(document.getElementById('nSido'), covered);
}

// QR
document.getElementById('qrimg').src =
  'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=8&data=' + encodeURIComponent(PHONE_URL);
document.getElementById('qrurl').textContent = PHONE_URL.replace(/^https?:\/\//,'');

let PROJ = null;
function makeProjection(pts){
  let laMin=90,laMax=-90,loMin=180,loMax=-180;
  for(const p of pts){ if(p[0]<laMin)laMin=p[0]; if(p[0]>laMax)laMax=p[0]; if(p[1]<loMin)loMin=p[1]; if(p[1]>loMax)loMax=p[1]; }
  const kx = Math.cos((laMin+laMax)/2 * Math.PI/180);
  const gxMin=loMin*kx, gxMax=loMax*kx, gyMin=laMin, gyMax=laMax;
  const scale = Math.min((W-2*PAD)/(gxMax-gxMin), (H-2*PAD)/(gyMax-gyMin));
  const offX = (W-(gxMax-gxMin)*scale)/2, offY = (H-(gyMax-gyMin)*scale)/2;
  return (la,lo)=>[ offX+(lo*kx-gxMin)*scale, offY+(gyMax-la)*scale ];
}

fetch('schools.json').then(r=>r.json()).then(d=>{
  const pts = d.schools.map(s=>[s[2], s[3]]);
  PROJ = makeProjection(pts);
  ctx.fillStyle = 'rgba(232,147,12,.15)';
  for(const [la,lo] of pts){ const [x,y]=PROJ(la,lo); ctx.fillRect(x, y, 1.6, 1.6); }
  fitStage(); startPolling();
});

function fitStage(){
  const wrap = document.getElementById('main');
  const s = Math.min(wrap.clientWidth/W, wrap.clientHeight/H) * 0.98;
  stage.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fitStage);

function bump(el, val){
  if(el.textContent === String(val)) return;
  el.textContent = val; el.classList.add('bump');
  setTimeout(()=>el.classList.remove('bump'), 200);
}
function ticker(name, region){
  const t = document.getElementById('ticker');
  t.innerHTML = `🎉 ${name} <span class="rg">· ${region||''}</span> 합류!`;
  t.classList.add('show');
  clearTimeout(ticker._t); ticker._t = setTimeout(()=>t.classList.remove('show'), 3200);
}
function confetti(n){
  const E = ['🎉','✨','🎊','⭐','📍','🥳'];
  for(let i=0;i<n;i++){
    const c = document.createElement('div'); c.className='conf'; c.textContent=E[i%E.length];
    c.style.left = Math.random()*100+'%';
    c.style.animationDuration = (1.8+Math.random()*1.4)+'s';
    c.style.animationDelay = (Math.random()*.5)+'s';
    document.getElementById('main').appendChild(c);
    setTimeout(()=>c.remove(), 3600);
  }
}

const seen = new Set();
let count = 0;
function addPin(school, region, la, lo, animate){
  if(!PROJ) return;
  const [x,y] = PROJ(la, lo);
  const color = COLORS[count % COLORS.length];
  const el = document.createElement('div'); el.className='pin';
  el.style.left=x+'px'; el.style.top=y+'px'; el.style.color=color;
  el.innerHTML =
    `<div class="pulse" style="color:${color}"></div>`+
    (animate?`<div class="ripple"></div>`:'')+
    `<div class="head" style="background:${color}"></div>`+
    `<div class="lab">${school}</div>`;
  if(!animate){ el.querySelectorAll('.head,.lab').forEach(n=>n.style.animation='none'); }
  pinsEl.appendChild(el);
}

async function poll(){
  try{
    const d = await (await fetch(API_URL)).json();
    const list = d.schools || [];
    let fresh = 0, last = null;
    list.forEach(r=>{
      const key = r.school + '@' + r.lat + ',' + r.lon;
      if(seen.has(key)) return;
      seen.add(key); count++; fresh++;
      addPin(r.school, r.region, +r.lat, +r.lon, seen.size>0);
      const sd = sidoOf(r.region); if(sd) sidoCount[sd]++;
      last = r;
    });
    if(fresh){
      document.getElementById('empty').style.opacity = 0;
      bump(document.getElementById('nSchool'), count);
      renderChips();
      if(last) ticker(last.school, last.region);
      confetti(fresh>1?18:8);
      if(count%10===0) confetti(40); // 마일스톤 대폭죽
    }
  }catch(e){ /* 다음 폴링에서 재시도 */ }
}
function startPolling(){ poll(); setInterval(poll, 3500); }
</script>
</body>
</html>
