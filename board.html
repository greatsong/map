<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 선생님 지도 🗺️</title>
<style>
  :root{ --gold:#F4B400; --accent:#E8930C; --bg:#FFFDF7; --card:#FFF6E0; --border:#F0E2BC; --text:#3A2E1A; --muted:#9A8B6A; --shadow:rgba(180,140,20,.25);
    --c-e:#22C55E; --c-m:#3B82F6; --c-h:#F59E0B; --c-x:#9CA3AF; }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:radial-gradient(1200px 820px at 72% -12%,#FFF7DE,#FFFDF7);color:var(--text);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;}
  #head{padding:15px 28px 4px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  #head h1{font-size:clamp(1.25rem,2.1vw,1.9rem);font-weight:900;letter-spacing:-.03em;margin:0;}
  #head h1 .a{color:var(--accent);}
  .stat{display:flex;align-items:baseline;gap:6px;background:#fff;border:1px solid var(--border);
    border-radius:16px;padding:6px 15px;box-shadow:0 3px 12px var(--shadow);}
  .stat .n{font-size:clamp(1.3rem,2.4vw,2rem);font-weight:900;color:var(--accent);line-height:1;
    font-variant-numeric:tabular-nums;transition:transform .18s;}
  .stat .n.bump{transform:scale(1.35);}
  .stat .lb{font-size:.82rem;font-weight:800;color:var(--muted);}
  .legend{display:flex;gap:14px;background:#fff;border:1px solid var(--border);border-radius:16px;
    padding:8px 16px;box-shadow:0 3px 12px var(--shadow);}
  .legend .it{display:flex;align-items:center;gap:6px;font-size:.9rem;font-weight:800;}
  .legend .sw{width:13px;height:13px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .legend .cnt{color:var(--muted);font-variant-numeric:tabular-nums;}
  #main{flex:1;position:relative;min-height:0;overflow:hidden;}
  #stage{position:absolute;left:0;top:0;transform-origin:0 0;transition:transform .85s cubic-bezier(.4,0,.2,1);}
  canvas{display:block;}
  #pins{position:absolute;inset:0;pointer-events:none;}
  .pin{position:absolute;left:0;top:0;transition:transform .85s cubic-bezier(.4,0,.2,1);}
  .pin .vis{transform:translate(-50%,-50%);}
  .pin .dot{width:15px;height:15px;border-radius:50%;border:2.5px solid #fff;
    box-shadow:0 3px 8px rgba(0,0,0,.3);animation:pop .5s cubic-bezier(.2,1.6,.4,1);}
  .pin .pulse{position:absolute;left:0;top:0;width:15px;height:15px;border-radius:50%;
    transform:translate(-50%,-50%);animation:pulse 2.6s ease-out infinite;}
  .pin .ripple{position:absolute;left:0;top:0;width:15px;height:15px;border-radius:50%;border:3px solid currentColor;
    transform:translate(-50%,-50%);animation:ripple 1.1s ease-out 1;opacity:0;}
  .pin .lab{position:absolute;left:50%;top:11px;transform:translateX(-50%);font-size:11px;font-weight:800;
    color:var(--text);white-space:nowrap;background:rgba(255,255,255,.92);border:1px solid var(--border);
    border-radius:8px;padding:1px 7px;box-shadow:0 2px 6px var(--shadow);animation:pop .5s cubic-bezier(.2,1.6,.4,1);}
  @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.25);}100%{transform:scale(1);}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 currentColor;opacity:.5;}70%,100%{box-shadow:0 0 0 15px transparent;opacity:0;}}
  @keyframes ripple{0%{opacity:.6;transform:translate(-50%,-50%) scale(.7);}100%{opacity:0;transform:translate(-50%,-50%) scale(6);}}
  #sido{position:absolute;left:20px;bottom:18px;background:rgba(255,255,255,.74);border:1px solid var(--border);
    border-radius:16px;padding:11px 12px;backdrop-filter:blur(6px);box-shadow:0 6px 20px var(--shadow);}
  #sido .t{font-size:.7rem;font-weight:800;color:var(--muted);margin-bottom:5px;}
  .chips{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .chip{display:flex;justify-content:space-between;gap:6px;align-items:center;font-size:.72rem;font-weight:800;
    padding:3px 9px;border-radius:99px;background:#F3ECD8;color:#B9AA86;transition:.3s;min-width:60px;}
  .chip.on{background:var(--accent);color:#fff;box-shadow:0 3px 9px var(--shadow);}
  #ticker{position:absolute;left:50%;top:16px;transform:translateX(-50%) translateY(-16px);
    background:var(--accent);color:#fff;font-weight:900;font-size:clamp(1rem,1.7vw,1.35rem);
    padding:11px 24px;border-radius:99px;box-shadow:0 10px 30px var(--shadow);opacity:0;transition:.35s;white-space:nowrap;z-index:5;}
  #ticker.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #ticker .rg{opacity:.85;font-weight:700;font-size:.8em;}
  #qr{position:absolute;right:20px;bottom:18px;background:#fff;border:1px solid var(--border);border-radius:18px;
    padding:13px 13px 9px;text-align:center;box-shadow:0 10px 30px var(--shadow);}
  #qr img{width:172px;height:172px;display:block;border-radius:8px;}
  #qr .t{margin-top:7px;font-weight:900;font-size:.92rem;}
  #qr .u{font-size:.72rem;color:var(--muted);word-break:break-all;max-width:172px;}
  #empty{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);text-align:center;color:var(--muted);
    font-weight:800;font-size:1.05rem;transition:.4s;}
</style>
</head>
<body>
  <div id="head">
    <h1>🗺️ 우리 학교는 어디에? <span class="a">전국 선생님 지도</span></h1>
    <div class="stat"><span class="n" id="nSchool">0</span><span class="lb">개 학교 🏫</span></div>
    <div class="stat"><span class="n" id="nSido">0</span><span class="lb">개 시·도</span></div>
    <div class="legend">
      <div class="it"><span class="sw" style="background:var(--c-e)"></span>초 <span class="cnt" id="cE">0</span></div>
      <div class="it"><span class="sw" style="background:var(--c-m)"></span>중 <span class="cnt" id="cM">0</span></div>
      <div class="it"><span class="sw" style="background:var(--c-h)"></span>고 <span class="cnt" id="cH">0</span></div>
    </div>
  </div>
  <div id="main">
    <div id="stage"><canvas id="map"></canvas></div>
    <div id="pins"></div>
    <div id="sido"><div class="t">시·도 채우기</div><div class="chips" id="chips"></div></div>
    <div id="empty">📱 오른쪽 QR을 스캔해<br>우리 학교를 지도에 올려주세요!</div>
    <div id="ticker"></div>
    <div id="qr">
      <img id="qrimg" alt="QR">
      <div class="t">📱 여기를 스캔!</div>
      <div class="u" id="qrurl"></div>
    </div>
  </div>

<script>
/* ===== 연결 정보 ===== */
const API_URL   = "https://script.google.com/macros/s/AKfycbyJkRn8dWVTU40QbWEurQVczygBRVYWhVAalIFc_etw6jvzfPjLd0uRuDuuQAQ_DoXXUQ/exec";
const PHONE_URL = "https://greatsong.github.io/map/";
/* ==================== */

const W = 760, H = 980, RES = 2, PAD = 40;
const cv = document.getElementById('map');
cv.width = W*RES; cv.height = H*RES; cv.style.width = W+'px'; cv.style.height = H+'px';
const ctx = cv.getContext('2d'); ctx.scale(RES,RES);
const stage = document.getElementById('stage'); stage.style.width = W+'px'; stage.style.height = H+'px';
const pinsEl = document.getElementById('pins');
const mainEl = document.getElementById('main');

const KIND_COLOR = {'초':'#22C55E','중':'#3B82F6','고':'#F59E0B'};
const kindColor = k => KIND_COLOR[k] || '#9CA3AF';

// 시·도
const SIDO = [
  {s:'서울',re:/^서울/},{s:'경기',re:/^경기/},{s:'인천',re:/^인천/},
  {s:'강원',re:/^강원/},{s:'충북',re:/^충청북|^충북/},{s:'충남',re:/^충청남|^충남/},
  {s:'대전',re:/^대전/},{s:'세종',re:/^세종/},{s:'전북',re:/^전(라|)북/},
  {s:'전남',re:/^전(라|)남/},{s:'광주',re:/^광주/},{s:'경북',re:/^경(상|)북/},
  {s:'경남',re:/^경(상|)남/},{s:'대구',re:/^대구/},{s:'부산',re:/^부산/},
  {s:'울산',re:/^울산/},{s:'제주',re:/^제주/}
];
const sidoCount = {}; SIDO.forEach(x=>sidoCount[x.s]=0);
const sidoOf = region => { const m = SIDO.find(x=>x.re.test(region||'')); return m?m.s:null; };
const chipsEl = document.getElementById('chips');
SIDO.forEach(x=>chipsEl.insertAdjacentHTML('beforeend',
  `<div class="chip" data-s="${x.s}"><span>${x.s}</span><span class="c">0</span></div>`));

document.getElementById('qrimg').src =
  'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=8&data=' + encodeURIComponent(PHONE_URL);
document.getElementById('qrurl').textContent = PHONE_URL.replace(/^https?:\/\//,'');

// ── 전국 투영 (고정) ──
let PROJ = null;
function makeProjection(pts){
  let laMin=90,laMax=-90,loMin=180,loMax=-180;
  for(const p of pts){ if(p[0]<laMin)laMin=p[0]; if(p[0]>laMax)laMax=p[0]; if(p[1]<loMin)loMin=p[1]; if(p[1]>loMax)loMax=p[1]; }
  const kx = Math.cos((laMin+laMax)/2 * Math.PI/180);
  const gxMin=loMin*kx, gxMax=loMax*kx, gyMin=laMin, gyMax=laMax;
  const scale = Math.min((W-2*PAD)/(gxMax-gxMin), (H-2*PAD)/(gyMax-gyMin));
  const offX = (W-(gxMax-gxMin)*scale)/2, offY = (H-(gyMax-gyMin)*scale)/2;
  return (la,lo)=>[ offX+(lo*kx-gxMin)*scale, offY+(gyMax-la)*scale ];
}

// ── 뷰(줌) 상태 : 핀 범위로 확대 ──
let view = {S:1,tx:0,ty:0};
const MAXSCALE = 5, MIN_SPAN = 150; // 1개/밀집 시 과확대 방지
function applyView(bx0,by0,bx1,by1){
  const mw=mainEl.clientWidth, mh=mainEl.clientHeight, M=70;
  let cx=(bx0+bx1)/2, cy=(by0+by1)/2, bw=bx1-bx0, bh=by1-by0;
  let S = Math.min((mw-2*M)/bw, (mh-2*M)/bh);
  S = Math.max(Math.min(mw/W, mh/H)*0.96, Math.min(S, MAXSCALE)); // 최소=전국 맞춤
  view = { S, tx: mw/2 - cx*S, ty: mh/2 - cy*S };
  stage.style.transform = `translate(${view.tx}px,${view.ty}px) scale(${S})`;
  repositionPins();
}
function repositionPins(){
  for(const p of PINS) p.el.style.transform = `translate(${view.tx+p.sx*view.S}px, ${view.ty+p.sy*view.S}px)`;
}
function fitToPins(){
  if(!PINS.length){ applyView(0,0,W,H); return; }
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const p of PINS){ if(p.sx<x0)x0=p.sx; if(p.sx>x1)x1=p.sx; if(p.sy<y0)y0=p.sy; if(p.sy>y1)y1=p.sy; }
  // 최소 범위 확보 + 전국 밖으로 안 나가게
  let cx=(x0+x1)/2, cy=(y0+y1)/2;
  let bw=Math.max(x1-x0, MIN_SPAN), bh=Math.max(y1-y0, MIN_SPAN);
  bw*=1.35; bh*=1.35; // 여백
  applyView(cx-bw/2, cy-bh/2, cx+bw/2, cy+bh/2);
}
window.addEventListener('resize', fitToPins);

const PINS = [], seen = new Set();
let count=0, cE=0,cM=0,cH=0;
function bump(el,val){ if(el.textContent===String(val))return; el.textContent=val; el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),200); }
function ticker(name,region){ const t=document.getElementById('ticker'); t.innerHTML=`🎉 ${name} <span class="rg">· ${region||''}</span> 합류!`; t.classList.add('show'); clearTimeout(ticker._t); ticker._t=setTimeout(()=>t.classList.remove('show'),3200); }

function addPin(school,region,la,lo,kind,animate){
  if(!PROJ) return;
  const [sx,sy]=PROJ(la,lo); const color=kindColor(kind);
  const el=document.createElement('div'); el.className='pin'; el.style.color=color;
  el.innerHTML=`<div class="vis">`+
    `<div class="pulse" style="color:${color}"></div>`+(animate?`<div class="ripple"></div>`:'')+
    `<div class="dot" style="background:${color}"></div>`+
    `<div class="lab">${school}</div></div>`;
  if(!animate) el.querySelectorAll('.dot,.lab').forEach(n=>n.style.animation='none');
  pinsEl.appendChild(el);
  const p={el,sx,sy}; PINS.push(p);
  el.style.transform=`translate(${view.tx+sx*view.S}px, ${view.ty+sy*view.S}px)`;
}
function renderChips(){
  SIDO.forEach(x=>{ const el=chipsEl.querySelector(`[data-s="${x.s}"]`); const n=sidoCount[x.s];
    el.classList.toggle('on',n>0); el.querySelector('.c').textContent=n; });
  bump(document.getElementById('nSido'), SIDO.filter(x=>sidoCount[x.s]>0).length);
}

let LOOKUP = {}; // "lat,lon" -> kind
fetch('schools.json').then(r=>r.json()).then(d=>{
  const pts=[];
  d.schools.forEach(s=>{ pts.push([s[2],s[3]]); LOOKUP[s[2]+','+s[3]] = s[4]; });
  PROJ = makeProjection(pts);
  ctx.fillStyle='rgba(232,147,12,.15)';
  for(const [la,lo] of pts){ const [x,y]=PROJ(la,lo); ctx.fillRect(x,y,1.4,1.4); }
  applyView(0,0,W,H);
  startPolling();
});

async function poll(){
  try{
    const d = await (await fetch(API_URL)).json();
    let fresh=0, last=null;
    (d.schools||[]).forEach(r=>{
      const key=r.school+'@'+r.lat+','+r.lon;
      if(seen.has(key)) return; seen.add(key); count++; fresh++;
      const kind = LOOKUP[r.lat+','+r.lon] || (r.kind||'');
      addPin(r.school, r.region, +r.lat, +r.lon, kind, true);
      const sd=sidoOf(r.region); if(sd) sidoCount[sd]++;
      if(kind==='초')cE++; else if(kind==='중')cM++; else if(kind==='고')cH++;
      last=r;
    });
    if(fresh){
      document.getElementById('empty').style.opacity=0;
      bump(document.getElementById('nSchool'), count);
      document.getElementById('cE').textContent=cE;
      document.getElementById('cM').textContent=cM;
      document.getElementById('cH').textContent=cH;
      renderChips();
      if(last) ticker(last.school, last.region);
      fitToPins();
    }
  }catch(e){ /* 다음 폴링에서 재시도 */ }
}
function startPolling(){ poll(); setInterval(poll, 3500); }
</script>
</body>
</html>
