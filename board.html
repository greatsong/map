<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 선생님 지도 🗺️</title>
<style>
  :root{ --gold:#F4B400; --accent:#E8930C; --bg:#FFFDF7; --card:#FFF6E0; --border:#F0E2BC; --text:#3A2E1A; --muted:#9A8B6A; --shadow:rgba(180,140,20,.25);
    --c-e:#22C55E; --c-m:#3B82F6; --c-h:#F59E0B; }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:radial-gradient(1200px 820px at 72% -12%,#FFF7DE,#FFFDF7);color:var(--text);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;}
  #head{padding:15px 28px 6px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  #head h1{font-size:clamp(1.25rem,2.1vw,1.9rem);font-weight:900;letter-spacing:-.03em;margin:0;}
  #head h1 .a{color:var(--accent);}
  .stat{display:flex;align-items:baseline;gap:6px;background:#fff;border:1px solid var(--border);
    border-radius:16px;padding:6px 16px;box-shadow:0 3px 12px var(--shadow);}
  .stat .n{font-size:clamp(1.4rem,2.5vw,2.1rem);font-weight:900;color:var(--accent);line-height:1;
    font-variant-numeric:tabular-nums;transition:transform .18s;}
  .stat .n.bump{transform:scale(1.35);}
  .stat .lb{font-size:.84rem;font-weight:800;color:var(--muted);}
  .legend{display:flex;gap:16px;background:#fff;border:1px solid var(--border);border-radius:16px;
    padding:8px 18px;box-shadow:0 3px 12px var(--shadow);}
  .legend .it{display:flex;align-items:center;gap:7px;font-size:1rem;font-weight:800;}
  .legend .sw{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .legend .cnt{color:var(--text);font-variant-numeric:tabular-nums;min-width:14px;}
  #main{flex:1;position:relative;min-height:0;overflow:hidden;}
  #map{position:absolute;inset:0;width:100%;height:100%;}
  #pins{position:absolute;inset:0;pointer-events:none;}
  .pin{position:absolute;left:0;top:0;}
  .pin .vis{transform:translate(-50%,-50%);}
  .pin .dot{width:15px;height:15px;border-radius:50%;border:2.5px solid #fff;
    box-shadow:0 3px 9px rgba(0,0,0,.32);animation:pop .5s cubic-bezier(.2,1.6,.4,1);}
  .pin .pulse{position:absolute;left:0;top:0;width:15px;height:15px;border-radius:50%;
    transform:translate(-50%,-50%);animation:pulse 2.6s ease-out infinite;}
  .pin .ripple{position:absolute;left:0;top:0;width:15px;height:15px;border-radius:50%;border:3px solid currentColor;
    transform:translate(-50%,-50%);animation:ripple 1.1s ease-out 1;opacity:0;}
  .pin .lab{position:absolute;left:50%;top:11px;transform:translateX(-50%);font-size:12px;font-weight:800;
    color:var(--text);white-space:nowrap;background:rgba(255,255,255,.94);border:1px solid var(--border);
    border-radius:8px;padding:1px 8px;box-shadow:0 2px 6px var(--shadow);animation:pop .5s cubic-bezier(.2,1.6,.4,1);}
  @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.25);}100%{transform:scale(1);}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 currentColor;opacity:.5;}70%,100%{box-shadow:0 0 0 15px transparent;opacity:0;}}
  @keyframes ripple{0%{opacity:.6;transform:translate(-50%,-50%) scale(.7);}100%{opacity:0;transform:translate(-50%,-50%) scale(6);}}
  #ticker{position:absolute;left:50%;top:16px;transform:translateX(-50%) translateY(-16px);
    background:var(--accent);color:#fff;font-weight:900;font-size:clamp(1rem,1.7vw,1.35rem);
    padding:11px 24px;border-radius:99px;box-shadow:0 10px 30px var(--shadow);opacity:0;transition:.35s;white-space:nowrap;z-index:5;}
  #ticker.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #ticker .rg{opacity:.85;font-weight:700;font-size:.8em;}
  #qr{position:absolute;right:20px;bottom:18px;background:#fff;border:1px solid var(--border);border-radius:18px;
    padding:13px 13px 9px;text-align:center;box-shadow:0 10px 30px var(--shadow);}
  #qr img{width:176px;height:176px;display:block;border-radius:8px;}
  #qr .t{margin-top:7px;font-weight:900;font-size:.95rem;}
  #qr .u{font-size:.72rem;color:var(--muted);word-break:break-all;max-width:176px;}
  #empty{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);text-align:center;color:var(--muted);
    font-weight:800;font-size:1.1rem;transition:.4s;}
</style>
</head>
<body>
  <div id="head">
    <h1>🗺️ 우리 학교는 어디에? <span class="a">전국 선생님 지도</span></h1>
    <div class="stat"><span class="n" id="nSchool">0</span><span class="lb">개 학교 접속!</span></div>
    <div class="legend">
      <div class="it"><span class="sw" style="background:var(--c-e)"></span>초 <span class="cnt" id="cE">0</span></div>
      <div class="it"><span class="sw" style="background:var(--c-m)"></span>중 <span class="cnt" id="cM">0</span></div>
      <div class="it"><span class="sw" style="background:var(--c-h)"></span>고 <span class="cnt" id="cH">0</span></div>
    </div>
  </div>
  <div id="main">
    <canvas id="map"></canvas>
    <div id="pins"></div>
    <div id="empty">📱 오른쪽 QR을 스캔해<br>우리 학교를 지도에 올려주세요!</div>
    <div id="ticker"></div>
    <div id="qr">
      <img id="qrimg" alt="QR">
      <div class="t">📱 여기를 스캔!</div>
      <div class="u" id="qrurl"></div>
    </div>
  </div>

<script>
/* ===== 연결 정보 ===== */
const API_URL   = "https://script.google.com/macros/s/AKfycbyJkRn8dWVTU40QbWEurQVczygBRVYWhVAalIFc_etw6jvzfPjLd0uRuDuuQAQ_DoXXUQ/exec";
const PHONE_URL = "https://greatsong.github.io/map/";
/* ==================== */

const KIND_COLOR = {'초':'#22C55E','중':'#3B82F6','고':'#F59E0B'};
const kindColor = k => KIND_COLOR[k] || '#9CA3AF';
const kindOf = name => name.includes('초등학교')?'초' : name.includes('고등학교')?'고' : name.includes('중학교')?'중' : '기타';

const mainEl = document.getElementById('main');
const cv = document.getElementById('map'), ctx = cv.getContext('2d');
const pinsEl = document.getElementById('pins');

document.getElementById('qrimg').src =
  'https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=8&data=' + encodeURIComponent(PHONE_URL);
document.getElementById('qrurl').textContent = PHONE_URL.replace(/^https?:\/\//,'');

let DIST = [];   // 시군구 [{n,p:[[ring...]],bbox,count}]
let NAT = null, VIEW = null;
const PINS = [], seen = new Set();
let count=0, cE=0,cM=0,cH=0;

function buildProj(g){
  const mw=mainEl.clientWidth, mh=mainEl.clientHeight;
  const kx=Math.cos((g.laMin+g.laMax)/2*Math.PI/180);
  const gw=(g.loMax-g.loMin)*kx, gh=(g.laMax-g.laMin);
  const scale=Math.min(mw/gw, mh/gh)*0.92;
  const cx=(g.loMin+g.loMax)/2*kx, cy=(g.laMin+g.laMax)/2;
  return { g, proj:(la,lo)=>[ mw/2+(lo*kx-cx)*scale, mh/2-(la-cy)*scale ] };
}
function drawMap(){
  const dpr=Math.min(window.devicePixelRatio||1, 2.5);
  const mw=mainEl.clientWidth, mh=mainEl.clientHeight;
  cv.width=mw*dpr; cv.height=mh*dpr; cv.style.width=mw+'px'; cv.style.height=mh+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,mw,mh);
  ctx.lineJoin='round'; ctx.lineWidth=0.9; ctx.strokeStyle='rgba(150,120,60,.45)';
  const P=VIEW.proj;
  for(const d of DIST){
    const path=new Path2D();
    for(const poly of d.p) for(const ring of poly){
      for(let i=0;i<ring.length;i++){ const [x,y]=P(ring[i][1],ring[i][0]); i?path.lineTo(x,y):path.moveTo(x,y); }
      path.closePath();
    }
    ctx.fillStyle = d.count>0 ? `rgba(232,147,12,${0.20+Math.min(d.count,6)*0.11})` : 'rgba(244,200,120,.10)';
    ctx.fill(path,'evenodd'); ctx.stroke(path);
  }
}
function repositionPins(){ const P=VIEW.proj; for(const p of PINS){ const [x,y]=P(p.la,p.lo); p.el.style.transform=`translate(${x}px,${y}px)`; } }
function render(){ drawMap(); repositionPins(); }

function inRing(lo,la,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>la)!==(yj>la)) && (lo < (xj-xi)*(la-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function districtOf(la,lo){
  for(const d of DIST){
    const b=d.bbox; if(lo<b[0]||lo>b[2]||la<b[1]||la>b[3]) continue;
    for(const poly of d.p){ let c=false; for(const ring of poly) if(inRing(lo,la,ring)) c=!c; if(c) return d; }
  }
  return null;
}

function pinsGeo(){
  let a0=90,a1=-90,o0=180,o1=-180;
  for(const p of PINS){ a0=Math.min(a0,p.la);a1=Math.max(a1,p.la);o0=Math.min(o0,p.lo);o1=Math.max(o1,p.lo); }
  const cLa=(a0+a1)/2, cLo=(o0+o1)/2;
  const sLa=Math.max(a1-a0, 0.18)*1.5, sLo=Math.max(o1-o0, 0.18)*1.5;
  let g={laMin:cLa-sLa/2,laMax:cLa+sLa/2,loMin:cLo-sLo/2,loMax:cLo+sLo/2};
  g.laMin=Math.max(g.laMin,NAT.laMin); g.laMax=Math.min(g.laMax,NAT.laMax);
  g.loMin=Math.max(g.loMin,NAT.loMin); g.loMax=Math.min(g.loMax,NAT.loMax);
  return g;
}
function fitChanged(g){
  if(!VIEW) return true;
  const v=VIEW.g, vLa=v.laMax-v.laMin, vLo=v.loMax-v.loMin;
  if(Math.abs((g.laMax-g.laMin)-vLa)/vLa>0.15) return true;
  if(Math.abs((g.loMax-g.loMin)-vLo)/vLo>0.15) return true;
  if(Math.abs((g.loMin+g.loMax)/2-(v.loMin+v.loMax)/2)>vLo*0.1) return true;
  if(Math.abs((g.laMin+g.laMax)/2-(v.laMin+v.laMax)/2)>vLa*0.1) return true;
  return false;
}
window.addEventListener('resize', ()=>{ if(VIEW){ VIEW=buildProj(VIEW.g); render(); } });

function bump(el,val){ if(el.textContent===String(val))return; el.textContent=val; el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),200); }
function ticker(name,region){ const t=document.getElementById('ticker'); t.innerHTML=`🎉 ${name} <span class="rg">· ${region||''}</span> 합류!`; t.classList.add('show'); clearTimeout(ticker._t); ticker._t=setTimeout(()=>t.classList.remove('show'),3200); }

function addPin(school,region,la,lo,kind){
  const color=kindColor(kind);
  const el=document.createElement('div'); el.className='pin'; el.style.color=color;
  el.innerHTML=`<div class="vis"><div class="pulse" style="color:${color}"></div><div class="ripple"></div>`+
    `<div class="dot" style="background:${color}"></div><div class="lab">${school}</div></div>`;
  pinsEl.appendChild(el);
  const p={el,la,lo}; PINS.push(p);
  if(VIEW){ const [x,y]=VIEW.proj(la,lo); el.style.transform=`translate(${x}px,${y}px)`; }
}

fetch('sigungu.json').then(r=>r.json()).then(d=>{
  let a0=90,a1=-90,o0=180,o1=-180;
  DIST = d.sigungu.map(f=>{
    let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
    for(const poly of f.p) for(const ring of poly) for(const [lo,la] of ring){
      if(lo<x0)x0=lo; if(lo>x1)x1=lo; if(la<y0)y0=la; if(la>y1)y1=la;
      if(la<a0)a0=la; if(la>a1)a1=la; if(lo<o0)o0=lo; if(lo>o1)o1=lo;
    }
    return {n:f.n, p:f.p, bbox:[x0,y0,x1,y1], count:0};
  });
  NAT={laMin:a0,laMax:a1,loMin:o0,loMax:o1};
  VIEW=buildProj(NAT); render();
  startPolling();
});

async function poll(){
  try{
    const d = await (await fetch(API_URL)).json();
    let fresh=0, last=null;
    (d.schools||[]).forEach(r=>{
      const key=r.school+'@'+r.lat+','+r.lon;
      if(seen.has(key)) return; seen.add(key); count++; fresh++;
      const kind = kindOf(r.school);
      addPin(r.school, r.region, +r.lat, +r.lon, kind);
      if(kind==='초')cE++; else if(kind==='중')cM++; else if(kind==='고')cH++;
      const dist = districtOf(+r.lat, +r.lon); if(dist) dist.count++;   // 어느 구인지 색칠용 카운트
      last=r;
    });
    if(fresh){
      document.getElementById('empty').style.opacity=0;
      bump(document.getElementById('nSchool'), count);
      document.getElementById('cE').textContent=cE;
      document.getElementById('cM').textContent=cM;
      document.getElementById('cH').textContent=cH;
      const g=pinsGeo(); if(fitChanged(g)) VIEW=buildProj(g);
      render();                                  // 지도(구 색칠 반영) + 핀 재배치
      if(last) ticker(last.school, last.region);
    }
  }catch(e){ /* 다음 폴링에서 재시도 */ }
}
function startPolling(){ poll(); setInterval(poll, 3500); }
</script>
</body>
</html>
